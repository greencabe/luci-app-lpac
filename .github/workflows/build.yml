name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: OpenWrt ${{ matrix.openwrt_version }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - openwrt_version: '25.12.5'
            sdk_arch: x86_64-25.12.5
            luci_branch: openwrt-25.12
            package_glob: luci-app-lpac-*.apk
          - openwrt_version: snapshot
            sdk_arch: x86_64
            luci_branch: master
            package_glob: luci-app-lpac-*.apk

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Prepare matching LuCI feed
        shell: bash
        env:
          LUCI_BRANCH: ${{ matrix.luci_branch }}
        run: |
          set -euxo pipefail

          rm -rf build-feed artifacts dist
          mkdir -p artifacts dist

          git clone --filter=blob:none --depth 1 \
            --branch "${LUCI_BRANCH}" \
            https://github.com/openwrt/luci.git \
            build-feed

          rm -rf build-feed/applications/luci-app-lpac
          cp -a applications/luci-app-lpac build-feed/applications/

          # Preserve the source tree. Remove only lpac from the temporary build
          # graph because this workflow compiles the LuCI app alone. Keep the
          # standard uloop module dependency in the emitted package metadata;
          # the versioned lpac requirement remains in LUCI_EXTRA_DEPENDS.
          grep -Fx 'LUCI_DEPENDS:=+luci-base +lpac +ucode-mod-uloop' \
            applications/luci-app-lpac/Makefile
          sed -i \
            's/^LUCI_DEPENDS:=+luci-base +lpac +ucode-mod-uloop$/LUCI_DEPENDS:=+luci-base +ucode-mod-uloop/' \
            build-feed/applications/luci-app-lpac/Makefile
          grep -Fx 'LUCI_DEPENDS:=+luci-base +ucode-mod-uloop' \
            build-feed/applications/luci-app-lpac/Makefile
          grep -Fx 'LUCI_EXTRA_DEPENDS:=lpac (>=2.3.0.438-r2)' \
            build-feed/applications/luci-app-lpac/Makefile

          source_epoch="$(git log -1 --format=%ct -- applications/luci-app-lpac)"
          source_sha="$(git rev-parse --short=7 HEAD)"
          source_date="$(date -u -d "@${source_epoch}" +%Y-%m-%dT%H:%M:%SZ)"

          git -C build-feed add applications/luci-app-lpac
          GIT_AUTHOR_DATE="${source_date}" \
          GIT_COMMITTER_DATE="${source_date}" \
            git -C build-feed \
              -c user.name='GitHub Actions' \
              -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
              commit --no-gpg-sign \
              -m "ci: stage luci-app-lpac ${source_sha}"

      - name: Build luci-app-lpac only
        uses: openwrt/gh-action-sdk@7fc2640243284ecc44f4a9c3f749a61746ee02cb # v11
        env:
          ARCH: ${{ matrix.sdk_arch }}
          ARTIFACTS_DIR: ${{ github.workspace }}/artifacts
          BUILD_LOG: 1
          FEED_DIR: ${{ github.workspace }}/build-feed
          FEEDNAME: lpac_review
          PACKAGES: luci-app-lpac
          V: s

      - name: Verify and collect package
        shell: bash
        env:
          PACKAGE_GLOB: ${{ matrix.package_glob }}
          OPENWRT_VERSION: ${{ matrix.openwrt_version }}
        run: |
          set -euxo pipefail

          mapfile -d '' packages < <(
            find artifacts/bin -type f -name "${PACKAGE_GLOB}" -print0
          )

          if [ "${#packages[@]}" -ne 1 ]; then
            echo "Expected exactly one ${PACKAGE_GLOB}, found ${#packages[@]}" >&2
            find artifacts -type f -print >&2
            exit 1
          fi

          case "$(basename "${packages[0]}")" in
            luci-app-lpac-0.apk|luci-app-lpac_0_*.ipk)
              echo 'Refusing a package with version 0' >&2
              exit 1
              ;;
          esac

          mapfile -d '' lpac_packages < <(
            find artifacts/bin -type f \
              \( -name 'lpac_*.ipk' -o -name 'lpac-*.apk' \) \
              -print0
          )

          if [ "${#lpac_packages[@]}" -ne 0 ]; then
            echo 'The SDK unexpectedly built an lpac package:' >&2
            printf '%s\n' "${lpac_packages[@]}" >&2
            exit 1
          fi

          destination="dist/openwrt-${OPENWRT_VERSION}"
          mkdir -p "${destination}"
          cp -v "${packages[0]}" "${destination}/"
          (
            cd "${destination}"
            sha256sum "$(basename "${packages[0]}")" > SHA256SUMS
            cat SHA256SUMS
          )

      - name: Upload review package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: luci-app-lpac-openwrt-${{ matrix.openwrt_version }}
          path: |
            dist/openwrt-${{ matrix.openwrt_version }}/${{ matrix.package_glob }}
            dist/openwrt-${{ matrix.openwrt_version }}/SHA256SUMS
          if-no-files-found: error
          retention-days: 14
